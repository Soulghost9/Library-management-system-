<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Issues - LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard.html">LMS</a>
    <div class="d-flex"><button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button></div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Issue / Active Issues</h2>
    <button id="issueBtn" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#issueModal">Issue Book</button>
  </div>

  <table id="issuesTable" class="display table table-bordered" style="width:100%">
    <thead><tr><th>ID</th><th>Book</th><th>Copy</th><th>Member</th><th>Issue Date</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<!-- Issue modal -->
<div class="modal fade" id="issueModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="issueForm" class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Issue Book</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3"><label>Member</label><select id="memberSelect" class="form-select" required></select></div>
        <div class="mb-3"><label>Book</label><select id="bookSelect" class="form-select" required><option value="">Select a book</option></select></div>
        <div class="mb-3"><label>Available Copy</label><select id="copySelect" class="form-select" required></select></div>
        <div id="formError" class="text-danger" style="display:none;"></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" type="submit">Issue</button></div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/issues.js"></script>
</body>
</html>
